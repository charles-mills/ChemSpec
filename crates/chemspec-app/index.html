<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChemSpec</title>
    <!-- Keep wasm-opt aligned with rustc's wasm32-unknown-unknown default features. -->
    <link
      data-trunk
      rel="rust"
      data-bin="chemspec-app"
      data-wasm-opt-params="--enable-multivalue --enable-mutable-globals --enable-reference-types --enable-sign-ext --enable-nontrapping-float-to-int --enable-bulk-memory"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #101014;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        outline: none;
      }
      body:has(canvas) #chemspec-boot {
        display: none;
      }
      #chemspec-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
        justify-content: center;
        color: #d5d5de;
        font: 400 1rem/1.5 system-ui, sans-serif;
        background: #101014;
      }
      #chemspec-boot .spinner {
        width: 2rem;
        height: 2rem;
        border: 3px solid #2a2a33;
        border-top-color: #8ce99a;
        border-radius: 50%;
        animation: chemspec-spin 0.8s linear infinite;
      }
      @keyframes chemspec-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="chemspec-boot">
      <div class="spinner"></div>
      <div id="chemspec-boot-message">Loading ChemSpec…</div>
    </div>
    <script>
      (function () {
        var failed = false;
        function bootFail(text) {
          if (failed) return;
          failed = true;
          var boot = document.getElementById("chemspec-boot");
          // Inline style outranks the body:has(canvas) rule, so this also
          // resurrects the panel over a dead canvas after a crash.
          boot.style.display = "flex";
          boot.style.zIndex = "10";
          boot.innerHTML = "";
          var message = document.createElement("div");
          message.style.maxWidth = "36rem";
          message.style.padding = "0 1.5rem";
          message.style.textAlign = "center";
          message.textContent = text;
          boot.appendChild(message);
        }
        var unsupported =
          "ChemSpec needs WebGPU, which this browser or device does not " +
          "provide. Please use a current Chrome, Edge, Safari, or Firefox.";
        if (!navigator.gpu) {
          bootFail(unsupported);
          return;
        }
        // navigator.gpu existing does not mean a usable GPU: Chrome on
        // Linux and blocklisted hardware return a null adapter.
        navigator.gpu.requestAdapter().then(
          function (adapter) {
            if (!adapter) bootFail(unsupported);
          },
          function () {
            bootFail(unsupported);
          },
        );
        function crashed(detail) {
          bootFail(
            "ChemSpec hit an unexpected error and stopped. Reloading may " +
              "help. Details: " + detail,
          );
        }
        addEventListener("error", function (event) {
          var text = String((event.error && event.error.message) || event.message || "");
          // winit "exits" its wasm event loop via a deliberate exception.
          if (text.indexOf("control flow") !== -1) return;
          crashed(text || "unknown error");
        });
        addEventListener("unhandledrejection", function (event) {
          var text = String((event.reason && event.reason.message) || event.reason || "");
          if (text.indexOf("control flow") !== -1) return;
          crashed(text || "unknown error");
        });
      })();
    </script>
  </body>
</html>
