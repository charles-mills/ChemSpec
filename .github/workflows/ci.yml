name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Linux quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Validate executable specification
        run: cargo run -p chems-conformance -- validate

  native-tests:
    name: Native tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run tests
        run: cargo test --workspace --all-targets
